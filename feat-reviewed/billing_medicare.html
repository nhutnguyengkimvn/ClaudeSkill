<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicare Telehealth 2026 — HCPCS Lookup</title>
<style>
  :root {
    --bg:#F7F6F3;--surface:#fff;--surface2:#F0EEE9;--border:#E2DED6;--border2:#C8C3B8;
    --text:#1A1916;--text2:#5C5A54;--text3:#9C9A94;
    --blue:#1A5FA8;--blue-bg:#EBF3FC;--blue-border:#B5D0EE;
    --green:#1A6B3A;--green-bg:#EAF4EE;
    --amber:#7A4B00;--amber-bg:#FEF4E0;--amber-border:#F5D68A;
    --mono:"Courier New",monospace;--radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
  .header-left h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
  .header-left p{font-size:12px;color:var(--text3);margin-top:1px}
  .header-badge{font-size:11px;font-weight:600;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);padding:4px 10px;border-radius:20px;white-space:nowrap}
  .layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 62px)}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;display:flex;flex-direction:column;gap:12px}
  .search-box{position:relative}
  .search-box input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
  .search-box input:focus{border-color:var(--blue)}
  .search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  .filter-row{display:flex;gap:6px}
  .filter-row select{flex:1;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;background:var(--bg);color:var(--text);outline:none;cursor:pointer}
  .list-header{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;padding:0 2px}
  .code-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}
  .code-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:background .1s;border:1px solid transparent}
  .code-item:hover{background:var(--surface2)}
  .code-item.active{background:var(--blue-bg);border-color:var(--blue-border)}
  .code-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);min-width:56px}
  .code-desc{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .dot-add{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0}
  main{padding:24px 28px;overflow-y:auto}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--text3);text-align:center;gap:10px}
  .empty-state svg{opacity:.3}.empty-state p{font-size:15px}.empty-state span{font-size:13px}
  .detail-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .detail-header h2{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--blue);letter-spacing:-1px}
  .desc-full{font-size:15px;color:var(--text2);margin-top:4px}
  .status-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .maintain{background:var(--green-bg);color:var(--green)}
  .addition{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
  .cat-tag{display:inline-block;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);padding:3px 8px;border-radius:var(--radius);margin-top:6px;letter-spacing:.3px}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
  .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .tag-list{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:12px;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text)}
  .tag.provider{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
  .tag.pos{background:#F0EBF8;color:#5B2D8B;border-color:#C9A8E8}
  .tag.mod{background:var(--green-bg);color:var(--green);border-color:#A8D8B8}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:14px}
  .section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .cond-list{list-style:none;display:flex;flex-direction:column;gap:6px}
  .cond-list li{padding-left:18px;position:relative;font-size:13px;color:var(--text);line-height:1.5}
  .cond-list li::before{content:"\2192";position:absolute;left:0;color:var(--blue);font-weight:600}
  .note-box{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--amber);line-height:1.5;margin-top:8px}
  .note-box strong{font-weight:700}
  .info-box{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:#184E8A;line-height:1.5;margin-top:8px}
  .stats-bar{display:flex;gap:16px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;flex-wrap:wrap}
  .stat{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
  .stat strong{color:var(--text);font-size:14px;font-weight:600}
  .no-result{text-align:center;padding:40px 0;color:var(--text3);font-size:13px}
  @media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{position:static;height:auto;max-height:300px}main{padding:16px}header{padding:12px 16px}}
</style>
</head>

let activeCode=null;

function buildCatFilter(){
  const cats=[...new Set(CODES.map(c=>c[3]))].sort();
  const sel=document.getElementById("catFilter");
  cats.forEach(c=>{const o=document.createElement("option");o.value=c;o.textContent=c;sel.appendChild(o);});
}

function filterList(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const cat=document.getElementById("catFilter").value;
  const act=document.getElementById("actionFilter").value;
  const filtered=CODES.filter(r=>{
    return(!q||r[0].toLowerCase().includes(q)||r[1].toLowerCase().includes(q))&&(!cat||r[3]===cat)&&(!act||r[2]===act);
  });
  renderList(filtered);
}

function renderList(filtered){
  const el=document.getElementById("codeList");
  document.getElementById("listCount").textContent=filtered.length+" codes";
  if(!filtered.length){el.innerHTML='<div class="no-result">No matching codes found</div>';return;}
  el.innerHTML=filtered.map(r=>`<div class="code-item ${activeCode===r[0]?"active":""}" onclick="showDetail('${r[0]}')"><span class="code-num">${r[0]}</span><span class="code-desc">${r[1]}</span>${r[2]==="Addition"?'<span class="dot-add" title="New Addition"></span>':""}</div>`).join("");
}

function showDetail(code){
  activeCode=code;
  const row=CODES.find(r=>r[0]===code);
  if(!row)return;
  const d=DETAILS[code]||getGenericDetail(row[0],row[1],row[2],row[3]);
  filterList();
  const main=document.getElementById("mainContent");
  const addCnt=CODES.filter(c=>c[2]==="Addition").length;
  const mCnt=CODES.filter(c=>c[2]==="Maintain").length;
  main.innerHTML=`
    <div class="stats-bar">
      <div class="stat"><strong>${CODES.length}</strong> total codes</div>
      <div class="stat"><strong style="color:var(--amber)">${addCnt}</strong> new additions</div>
      <div class="stat"><strong style="color:var(--green)">${mCnt}</strong> maintained</div>
      <div class="stat" style="margin-left:auto;color:var(--text3)">CY 2026 Final List</div>
    </div>
    <div class="detail-header">
      <div>
        <h2>${row[0]}</h2>
        <div class="desc-full">${d.fullDesc}</div>
        <span class="cat-tag">${row[3]}</span>
        ${d.type==="add-on"?'<span class="cat-tag" style="background:#FEF4E0;color:var(--amber);margin-left:6px">Add-on code</span>':""}
      </div>
      <span class="status-pill ${row[2].toLowerCase()}">${row[2]==="Addition"?"New Addition":"Maintain"}</span>
    </div>
    <div class="cards-grid">
      <div class="card">
        <div class="card-title"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>Eligible providers</div>
        <div class="tag-list">${d.providers.map(p=>`<span class="tag provider">${p}</span>`).join("")}</div>
      </div>
      <div class="card">
        <div class="card-title"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>Place of service</div>
        <div class="tag-list">${d.pos.map(p=>`<span class="tag pos">${p}</span>`).join("")}</div>
      </div>
      <div class="card">
        <div class="card-title"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>Modifiers</div>
        <div class="tag-list">${d.modifiers.map(m=>`<span class="tag mod">${m}</span>`).join("")}${d.audioOnly?'<span class="tag mod">93 — Audio-only (where applicable)</span>':""}
        </div>
      </div>
    </div>
    ${d.type==="add-on"&&d.primaryCodes?`<div class="section"><div class="section-title">Required primary codes — must be billed together</div><div class="tag-list">${d.primaryCodes.map(c=>{const r2=CODES.find(x=>x[0]===c);return `<span class="tag" style="cursor:pointer;font-family:var(--mono)" onclick="showDetail('${c}')" title="${r2?r2[1]:""}">${c}</span>`;}).join("")}</div><div class="note-box" style="margin-top:12px"><strong>Important:</strong> ${row[0]} is an add-on code and cannot be billed independently. CMS will reject the claim if no primary code is present on the same claim.</div></div>`:""}
    <div class="section">
      <div class="section-title">Coverage conditions</div>
      <ul class="cond-list">${d.conditions.map(c=>`<li>${c}</li>`).join("")}</ul>
    </div>
    <div class="section">
      <div class="section-title">Billing notes &amp; audit risk</div>
      <ul class="cond-list">${d.notes.map(n=>`<li>${n}</li>`).join("")}</ul>
      ${!d.audioOnly?'<div class="note-box" style="margin-top:12px"><strong>Audio-only is NOT permitted</strong> for this code. Real-time two-way audio-video is required (POS 02 or 10 + modifier 95).</div>':`<div class="info-box" style="margin-top:12px">Audio-only (telephone) may be permitted with modifier <strong>93</strong> under certain conditions — confirm with your MAC before billing.</div>`}
    </div>
    <div class="section">
      <div class="section-title">Documentation checklist</div>
      <ul class="cond-list">
        <li>Date and start/end time of service</li>
        <li>Provider name, NPI, and credentials</li>
        <li>Telehealth modality used (platform, video/audio)</li>
        <li>Patient location at time of service</li>
        <li>Medical necessity — ICD-10 diagnosis code(s)</li>
        <li>Specific content of the service (not just the code name)</li>
        <li>Patient consent for telehealth (documented in chart)</li>
        ${d.type==="add-on"?"<li><strong>Interactive complexity factors</strong> — describe the specific situation in the clinical note</li>":""}
      </ul>
    </div>`;
}

buildCatFilter();
filterList();
</script>
